# ── Application ──────────────────────────────────────────────
spring.application.name=team-task-manager

# ── H2 In-Memory Database (Development) ─────────────────────
spring.datasource.url=jdbc:h2:mem:taskmanagerdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ── JPA ──────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ── H2 Console (dev only) ────────────────────────────────────
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── JWT ──────────────────────────────────────────────────────
app.jwt.secret=M7gP2qR5sT8vY1zA4cF9hJ0kL3nQ6uW!mB@dE#xK$pC^oU&eR
app.jwt.expiration=86400000

# ── CORS ─────────────────────────────────────────────────────
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000,http://localhost:4173

# ── Default Admin Seed (development) ─────────────────────────
app.admin.seed.enabled=true
app.admin.seed.name=System Admin
app.admin.seed.email=admin@teamflow.local
app.admin.seed.password=Admin@123

# ── Server ───────────────────────────────────────────────────
server.port=${PORT:8080}

# ── Actuator ─────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
