# ── PostgreSQL (Railway) ─────────────────────────────────────
spring.datasource.url=${DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA ──────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ── H2 Console (disabled in prod) ────────────────────────────
spring.h2.console.enabled=false

# ── JWT ──────────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=86400000

# ── CORS ─────────────────────────────────────────────────────
app.cors.allowed-origins=${ALLOWED_ORIGINS:https://your-frontend.railway.app}

# ── Default Admin Seed (production override) ────────────────
app.admin.seed.enabled=${ADMIN_SEED_ENABLED:false}
app.admin.seed.name=${ADMIN_NAME:System Admin}
app.admin.seed.email=${ADMIN_EMAIL:admin@teamflow.local}
app.admin.seed.password=${ADMIN_PASSWORD:ChangeMe123!}

# ── Actuator ─────────────────────────────────────────────────
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
